[alembic]
# path to migration scripts
script_location = src/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .
version_path_separator = ;

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `python-dateutil` to requirements.txt
# timezone =

# max length of characters to apply to the
# "rev_id" field when generating a migration revision.
# Defaults to 12.
# rev_id =

# When set to 'True', the running of online migrations
# will render the SQL for the migration to stdout
# instead of executing it on the target database.
# sql =

# When set to 'True', the migration environment will
# be considered as "already in a transaction", which
# affects how the transaction management is handled.
# transaction_per_migration =

# The output encoding used when revision files
# are written from script.py.mako
# output_encoding =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s